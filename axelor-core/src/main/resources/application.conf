# Caffeine configuration
#
# NOTE: durations without an explicit unit are interpreted as milliseconds,
# so always specify an explicit unit (s, m, h, d) to avoid unexpected behavior.
caffeine.jcache {

  # Default configuration
  default {
    # Number of objects in each cache entry
    policy.maximum.size = 1000
    # By default, objects stay 10 minutes in the cache.
    policy.eager-expiration.after-write = 10m
  }

  # Holding timestamps of the most recent updates to queryable tables.
  # These are used to validate the results as they are served from the query cache.
  # No expiration is recommended:
  # https://docs.hibernate.org/stable/orm/userguide/html_single/#caching-query-region
  default-update-timestamps-region {
    policy.maximum.size = null
    policy.eager-expiration.after-write = null
  }

  # Holding the cached query results.
  default-query-results-region {
    policy.maximum.size = 100
  }

  # Dedicated regions for the frequently-read, rarely-changed entities
  com.axelor.auth.db.User {
    policy.maximum.size = 500
    policy.eager-expiration.after-write = null
    policy.eager-expiration.after-access = 24h
  }
  com.axelor.auth.db.Group {
    policy.maximum.size = 200
    policy.eager-expiration.after-write = null
    policy.eager-expiration.after-access = 24h
  }
  com.axelor.auth.db.Role {
    policy.maximum.size = 200
    policy.eager-expiration.after-write = null
    policy.eager-expiration.after-access = 24h
  }
  com.axelor.auth.db.Permission {
    policy.maximum.size = 10000
    policy.eager-expiration.after-write = null
    policy.eager-expiration.after-access = 24h
  }
}
